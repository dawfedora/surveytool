<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Edgewood Survey Tool</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a7c59">

  <meta http-equiv="Cache-Control" content="no-cache">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Edgewood Survey">

  <!-- Older Android support -->
  <meta name="mobile-web-app-capable" content="yes">

  <style>
html,
body {
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  margin: 0;
  padding-top: calc(env(safe-area-inset-top) + 8px);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: 8px;
  padding-right: 8px;
  min-height: 100%;
}

    h1 {
      font-size: 1.0em;
      margin: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    #modeBtn, #downloadBtn, #refreshBtn {
      padding: 4px 8px;
      font-size: 0.8em;
    }

    #startBtn, #trailBtn, #closeBtn {
      padding: 4px 8px;
      font-size: 0.8em;
    }

    .deleteBtn {
      flex: 0 0 auto;
      font-size: 18px;
      padding: 2px 8px;
      margin-left: 4px;
      border: none;
      border-radius: 6px;
      background: #eee;
      color: #900;
      cursor: pointer;
    }

#logView {
  position: relative;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}


    #searchArea {
      flex: 0 0 auto;
      background: #f5f5f5;
      padding-top: 6px;
      z-index: 100;
      position: relative;
    }
#logTrailSelect {
  flex: 0 0 auto;
}

#notesView {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

#log {
  flex: 1 1 auto;
  overflow-y: auto;
  min-height: 0;
}

#results {
  position: absolute;

  /* starts BELOW search input */
  top: var(--results-top, 0);

  left: 0;
  right: 0;
  bottom: 0;

  z-index: 1000;
  overflow-y: auto;
  background: #eef5ff;

  display: none;
}

#results:not(:empty) {
  display: block;
}
    select, input {
      width: 100%;
      padding: 12px;
      font-size: 1em;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      line-height: 1.3;
    }

    .resultItem {
      padding: 12px 10px;
      line-height: 1.25;
      border-bottom: 1px solid #ddd;
      background: #f8fbff;
    }

    .resultItem .scientific {
      font-size: 0.9em;
    }

    .resultItem:active {
      background: #dcecff;
    }

    .activeNoteBtn {
      background: #dcecff;
    }

    .item:last-child {
      border-bottom: none;
    }

    .common {
      font-weight: bold;
      margin-right: 6px;
    }

    .scientific {
      font-style: italic;
      color: #555;
    }

    #search {
      font-size: 16px;
    }

  .longNote {
    width: 100%;
    min-height: 8em;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: white;
    box-sizing: border-box;
    resize: vertical;
  }

textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: white;
  resize: vertical;
}

    #status {
      font-size: 0.8em;
      color: #666;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

  <div id="globalHeader">
    <div class="header">
      <h1>Edgewood Survey</h1>
      <div>
        <button id="modeBtn">Notes</button>
        <button id="newBtn">New Survey</button>
        <button id="refreshBtn">Refresh</button>
        <button id="downloadBtn">Download</button>
      </div>
    </div>
    <div id="status"></div>
  </div>

  <div id="logView">

    <!-- search stays fixed under header -->
    <div id="searchArea">
      <input
        id="search"
        type="text"
        placeholder="Search plant..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
    </div>

    <!-- normal content -->
    <select id="logTrailSelect"></select>

    <div id="log"></div>

    <!-- overlays selector + log -->
    <div id="results"></div>

  </div>

  <div id="notesView" style="display:none">

      <!-- notes buttons -->
    <div class = "header">
      <button id="startBtn">Start Note</button>
      <button id="trailBtn">Trail Notes</button>
      <button id="closeBtn">Closing Note</button>
    </div>

    <div id="startPanel">
      <input id="startDate" />
      <input id="startTime" />
      <input id="startWeather" placeholder="75 F, partly cloudy" />
      <textarea
        id="participants" class="longNote" placeholder="Participants">
      </textarea>
      <textarea
        id="startNote" class="longNote" placeholder="Starting notes">
      </textarea>
    </div>

    <div id="trailPanel" style="display:none">
      <select id="notesTrailSelect"></select>
      <textarea
        id="trailNotes" class="longNote" placeholder="Notes..." >
      </textarea>
    </div>

    <div id="closePanel"  style="display:none">
      <input id="closeTime" />
      <input id="closeWeather" placeholder="82 F, sunny" />	
      <textarea
        id="closeNote" class="longNote" placeholder="Closing notes">
      </textarea>
    </div>

  </div>

  <script src="app.js"></script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('./sw.js');
        console.log('Service worker registered');
      } catch (err) {
        console.error( 'SW registration failed', err);
      }
    });
  }
</script>

</body>
</html>
