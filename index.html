<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Edgewood Survey Tool</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a7c59">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SurveyTool">

  <!-- Older Android support -->
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      margin: 0;
      padding-top: calc(env(safe-area-inset-top) + 8px);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: 8px;
      padding-right: 8px;
      min-height: 100%;
    }

    h1 {
      font-size: 1.0em;
      margin: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #globalHeader {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* top row */
    .headerTop {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* logo + title group */
    .headerIdentity {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .headerMeta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      text-align: right;
    }

    #version {
      font-size: 0.8rem;
      white-space: nowrap;
    }

    #status {
      font-size: 0.9rem;
    }

    #foeLogo {
      height: 38px;
      width: auto;
      display: block;
    }

    .title {
      font-size: 16px;
      line-height: 1;
      font-weight: 600;
    }

    /* bottom row */
    .headerActions {
      display: flex;
      flex-wrap: wrap;   /* allows graceful wrap instead of breaking layout */
      gap: 4px;
    }

    .headerActions button {
      padding: 4px 8px;
      font-size: 0.8em;
    }

    #modeBtn, #newBtn, #downloadBtn, #refreshBtn, #importBtn {
      padding: 4px 8px;
      font-size: 0.8em;
    }

    #startBtn, #trailBtn, #closeBtn {
      padding: 4px 8px;
      font-size: 0.8em;
    }

    .deleteBtn {
      flex: 0 0 auto;
      font-size: 18px;
      padding: 2px 8px;
      margin-left: 4px;
      border: none;
      border-radius: 6px;
      background: #eee;
      color: #900;
      cursor: pointer;
    }

    #stateMessagePanel {
      padding: 8px 10px;
      border: 1px solid #d8b45a;
      background: #fff7d6;
      font-size: 0.9rem;
      line-height: 1.25;
    }

    #logView {
      position: relative;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #searchArea {
      position: relative;
      flex: 0 0 auto;
      background: #f5f5f5;
      padding-top: 6px;
      z-index: 100;
    }

    #search {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 6px 38px 6px 10px;
      margin-bottom: 6px;
    }

    #clearSearch {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      font-size: 22px;
      padding: 6px;
      cursor: pointer;
    }

    #logTrailSelect {
      flex: 0 0 auto;
    }

    .logRow {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    
    .logNote {
      flex: 0 1 auto;

      min-width: 5ch;
      max-width: 50%;

      resize: none;
      overflow: hidden;
      font: inherit;
      line-height: inherit;
      white-space: pre;
      word-break: break-word;
      padding-top: 0;
      padding-bottom: 0;
      padding-left: 4px;
      padding-right: 4px;

      box-sizing: border-box;
      vertical-align: top;
    }



    #notesView {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    #log {
      flex: 1 1 auto;
      overflow-y: auto;
      min-height: 0;
    }

    #results {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 1000;
      overflow-y: auto;
      background: #eef5ff;
      display: none;
    }

    #results:not(:empty) {
      display: block;
    }
    select, input {
      width: 100%;
      padding: 12px;
      font-size: 1em;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      line-height: 1.3;
    }

    .participantResults {
      position: absolute;
      left: 0;
      right: 0;
      background: #eef5ff;
      border: 1px solid #ccc;
      max-height: 200px;
      overflow-y: auto;
      z-index: 2000;
    }
    .participantWrapper {
      position: relative;
    }
    #participants {
      width: 100%;
      resize: vertical;
      min-height: 2.5em;
    }
    .resultItem {
      padding: 12px 10px;
      line-height: 1.25;
      border-bottom: 1px solid #ddd;
      background: #f8fbff;
    }

    .resultItem .scientific {
      font-size: 0.9em;
    }

    .resultItem:active {
      background: #dcecff;
    }

    .activeNoteBtn {
      background: #dcecff;
    }

    .item:last-child {
      border-bottom: none;
    }

    .common {
      font-weight: bold;
      margin-right: 6px;
    }

    .scientific {
      font-style: italic;
    }

    .inputRejected {
      background: #ffeaea;
    }

    .longNote {
      width: 100%;
      min-height: 8em;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      box-sizing: border-box;
      resize: vertical;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      resize: vertical;
    }


  </style>
</head>

<body>

  <div id="globalHeader">

    <div class="headerTop">
      <div class="headerIdentity">
        <img id="foeLogo" src="./foe-logo.png" alt="FoE logo">
        <div class="title">Survey Tool</div>
      </div>

      <div class="headerMeta">
        <div id="version"></div>
        <div id="status"></div>
      </div>
    </div>

    <div class="headerActions">
      <button id="modeBtn">Notes</button>
      <button id="newBtn">New Survey</button>
      <button id="refreshBtn">Refresh</button>
      <button id="importBtn" style="display:none">Import</button>
      <input id="importInput" type="file" accept="application/json,.json" hidden />
      <button id="downloadBtn">Down</button>
    </div>

	<div id="messagePanel" hidden>
	  <span id="messageText"></span>
	  <button id="dismissMessageBtn"
	          aria-label="Dismiss message">
	    x 
	  </button>
	</div>

	<div id="stateMessagePanel" hidden></div>

  </div>

  <div id="logView">

    <!-- search stays fixed under header -->
    <div id="searchArea">
      <input
        id="search"
        type="text"
        placeholder="Search plant..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button id="clearSearch" type="button" aria-label="Clear search">
        X
      </button>
    </div>

    <!-- normal content -->
    <select id="logTrailSelect"></select>

    <div id="log"></div>

    <!-- overlays selector + log -->
    <div id="results"></div>

  </div>

  <div id="notesView" style="display:none">

      <!-- notes buttons -->
    <div class = "header">
      <button id="startBtn">Start Note</button>
      <button id="trailBtn">Trail Notes</button>
      <button id="closeBtn">Closing Note</button>
    </div>

    <div id="startPanel">
      <input id="startDate" />
      <input id="startTime" />
      <input id="startWeather" placeholder="75 F, partly cloudy" />
      <div class="participantWrapper">
        <textarea id="participants" rows="2" placeholder="Participants"></textarea>
        <div id="participantResults"
          class="participantResults">
        </div>
      </div>
      <textarea id="startNote" class="longNote" placeholder="Starting notes"></textarea>
    </div>

    <div id="trailPanel" style="display:none">
      <select id="notesTrailSelect"></select>
      <textarea id="trailNotes" class="longNote" placeholder="Notes..." ></textarea>
    </div>

    <div id="closePanel"  style="display:none">
      <input id="closeTime" />
      <input id="closeWeather" placeholder="82 F, sunny" />	
      <textarea id="closeNote" class="longNote" placeholder="Closing notes"></textarea>
    </div>

  </div>

  <script src="app.js"></script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('./sw.js');
        console.log('Service worker registered');
      } catch (err) {
        console.error( 'SW registration failed', err);
      }
    });
  }
</script>

</body>
</html>
