<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edgewood Survey Tool</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a7c59">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 1.0em;
      margin: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    #downloadBtn, #refreshBtn, #clearBtn {
      padding: 4px 8px;
      font-size: 0.8em;
    }

    .deleteBtn {
      flex: 0 0 auto;
      font-size: 18px;
      padding: 2px 8px;
      margin-left: 4px;
      border: none;
      border-radius: 6px;
      background: #eee;
      color: #900;
      cursor: pointer;
    }

    select, input {
      width: 100%;
      padding: 12px;
      font-size: 1em;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    #results {
      background: white;
      border-radius: 8px;
      max-height: 25vh;
      overflow-y: auto;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    #log {
      background: white;
      border-radius: 8px;
      max-height: 45vh;
      overflow-y: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding-bottom: 10px;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      line-height: 1.3;
    }

    .resultitem {
      padding: 10px;
      border-bottom: 1px solid #eee;
      line-height: 1.15;
    }

    .item:last-child {
      border-bottom: none;
    }

    .common {
      font-weight: bold;
      margin-right: 6px;
    }

    .scientific {
      font-style: italic;
      color: #555;
    }

    #searchArea {
      position: sticky;
      bottom: 0;
      background: #f5f5f5;
      padding-top: 6px;
    }

    textarea {
      font-family: inherit;
      font-size: 0.9em;
      border: none;
      background: transparent;
      outline: none;
      line-height: 1.3;
    }

    #status {
      font-size: 0.8em;
      color: #666;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Edgewood Survey</h1>
    <div>
      <button id="refreshBtn">Refresh</button>
      <button id="downloadBtn">Download</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

  <div id="status"></div>

  <!-- Trail selector -->
  <select id="trailSelect"></select>

  <!-- Log of sightings -->
  <div id="log"></div>

  <!-- Search + results (sticky bottom) -->
  <div id="searchArea">
    <div id="results"></div>
    <input id="search" type="text" placeholder="Type plant name..." />
  </div>

  <script src="app.js"></script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('./sw.js');
        console.log('Service worker registered');
      } catch (err) {
        console.error('SW registration failed', err);
      }
    });
  }
  </script>

</body>
</html>
